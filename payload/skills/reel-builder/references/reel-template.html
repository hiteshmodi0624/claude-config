<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1080,initial-scale=1" />
<title>REEL TEMPLATE — replace title</title>
<!--
  9:16 vertical reel — 1080×1920, 30s, CSS-only animations.
  6 scenes × 5s. No brand logo on stage.
  Content lives in TOP 60% (y = 0–1152px). Bottom 768px is empty for the
  ad-platform CTA overlay (IG/Meta CTA button + caption + share/comment icons).

  Render:
    node <path>/record-<topic>.mjs

  Preview scene midpoints:
    node <path>/preview-<topic>.mjs

  ── TIMELINE (30s, 6 scenes × 5s) ──
    s1  0   – 16.67%  (0–5s)    HOOK            — pattern interrupt / open loop
    s2  16.67 – 33.33% (5–10s)  PROBLEM         — concrete relatable moment
    s3  33.33 – 50%   (10–15s)  PRODUCT         — phone mockup / visual demo
    s4  50   – 66.67% (15–20s)  ASPIRATION      — compounding / future-pace
    s5  66.67 – 83.33% (20–25s) URGENCY         — padlock / commitment moment
    s6  83.33 – 100%  (25–30s)  CTA             — ONLY product-price screen
  Each scene: enter 1.5%, hold to (end – 1.5%), exit 1.5%.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Patrick+Hand&display=swap" rel="stylesheet" />
<style>
  /* ── Design tokens — swap palette per brand ─────────────── */
  :root {
    --bg-a: #f7a700;        /* primary brand bleed */
    --bg-b: #ffe2a0;        /* highlight gradient stop */
    --bg-c: #ffcb6a;        /* secondary gradient stop */
    --ink: #1a1208;
    --ink-mute: rgba(26, 18, 8, .68);
    --ink-line: rgba(26, 18, 8, .14);
    --tile: rgba(255, 246, 220, .55);
    --tile-strong: #0b0b0d;
    --pop-rose: #ff6b81;
    --pop-rose-deep: #c44a5e;
    --pop-mint: #3ddc97;
  }

  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body {
    margin: 0; padding: 0;
    background: #000;
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  .viewport { position: fixed; inset: 0; display: grid; place-items: center; background: #000; }
  .stage {
    position: relative;
    width: 1080px; height: 1920px;
    overflow: hidden;
    isolation: isolate;
    background:
      radial-gradient(900px 700px at 100% 0%, var(--bg-b) 0%, transparent 60%),
      radial-gradient(900px 700px at 0% 100%, var(--bg-c) 0%, transparent 55%),
      var(--bg-a);
    border-radius: 24px;
    transform-origin: center center;
  }
  @media (max-width: 1080px), (max-height: 1920px) {
    .stage { transform: scale(min(calc(100vw / 1080), calc(100vh / 1920))) }
  }

  /* Slow ambient warmth pulse (12s loop) */
  .stage::before {
    content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(800px 700px at 50% 50%, rgba(255, 226, 160, .35), transparent 70%);
    animation: breathe 12s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: .6; transform: scale(1); }
    50%      { opacity: .9; transform: scale(1.08); }
  }

  /* Drifting parallax doodles — never compete with foreground */
  .ambient { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .ambient .d {
    position: absolute;
    font-family: 'Patrick Hand', cursive;
    color: var(--ink);
    opacity: .18;
    font-weight: 700;
    animation: drift 18s linear infinite;
  }
  .ambient .d.spark { font-size: 60px; opacity: .26; }
  .ambient .a1 { top:  6%; left:  6%; animation-delay: -1s;  }
  .ambient .a2 { top: 14%; right: 8%; animation-delay: -4s;  transform: rotate(8deg); }
  .ambient .a3 { top: 32%; left:  4%; animation-delay: -7s;  transform: rotate(-12deg); }
  .ambient .a4 { top: 44%; right: 6%; animation-delay: -2s;  transform: rotate(10deg); opacity: .14; }
  .ambient .a5 { top: 50%; left: 8%; animation-delay: -10s; opacity: .22; }
  .ambient .a6 { top: 56%;  right: 12%; animation-delay: -6s; transform: rotate(-6deg); }
  @keyframes drift {
    0%   { transform: translate3d(0, 0, 0) rotate(0); }
    50%  { transform: translate3d(20px, -28px, 0) rotate(8deg); }
    100% { transform: translate3d(0, 0, 0) rotate(0); }
  }

  /* Top progress bar */
  .progress {
    position: absolute; left: 54px; right: 54px; top: 36px;
    height: 5px; background: rgba(26, 18, 8, .14); border-radius: 99px; overflow: hidden; z-index: 9;
  }
  .progress > i {
    display: block; height: 100%; width: 0;
    background: linear-gradient(90deg, var(--ink), var(--pop-rose-deep), var(--bg-a));
    border-radius: 99px;
    animation: fillBar 30s linear forwards infinite;
  }
  @keyframes fillBar { from { width: 0; } to { width: 100%; } }

  /* ── Scene wrappers ───────────────────────────────────────
     HARD RULE: content lives in top 1080px (=56% of 1920).
     This makes the top-anchored 1080×1080 square crop center
     content at exactly y=540 (true square center).
     Bottom 840px (44%) reserved for ad-platform CTA overlay. */
  .scene {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1080px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 180px 70px 50px;
    z-index: 3;
    opacity: 0;
    animation-duration: 30s;
    animation-iteration-count: infinite;
    animation-timing-function: cubic-bezier(.22, .8, .32, 1);
    animation-fill-mode: both;
  }

  /* ── Scene 1 — HOOK (0–5s) ───────────────────────────── */
  .s1 { animation-name: s1; }
  @keyframes s1 {
    0%      { opacity: 0; }
    1.5%    { opacity: 1; }
    15%     { opacity: 1; }
    16.67%  { opacity: 0; }
    100%    { opacity: 0; }
  }
  .s1 .hook {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 120px;
    line-height: 1.02;
    letter-spacing: -.035em;
    text-align: center;
    margin: 0;
    max-width: 920px;
    color: var(--ink);
  }
  .s1 .hook .line1 {
    display: block;
    opacity: 0;
    animation: s1-line1 30s linear infinite both;
  }
  .s1 .hook .line2 {
    display: block;
    margin-top: 40px;
    color: var(--ink-mute);
    font-size: 84px;
    opacity: 0;
    animation: s1-line2 30s linear infinite both;
  }
  /* Big punctuation word in rose pill */
  .s1 .hook .line2 b {
    font-style: normal;
    color: var(--pop-rose-deep);
    font-weight: 900;
    font-size: 200px;
    line-height: 1;
    display: inline-block;
    position: relative;
  }
  @keyframes s1-line1 {
    0%      { opacity: 0; transform: translateY(30px); }
    4%      { opacity: 1; transform: translateY(0); }
    15%     { opacity: 1; }
    16.67%  { opacity: 0; transform: translateY(-20px); }
    100%    { opacity: 0; }
  }
  @keyframes s1-line2 {
    0%, 6%  { opacity: 0; transform: translateY(30px); }
    9%      { opacity: 1; transform: translateY(0); }
    15%     { opacity: 1; }
    16.67%  { opacity: 0; transform: translateY(-20px); }
    100%    { opacity: 0; }
  }

  /* ── Scene 2 — PROBLEM (5–10s) ───────────────────────── */
  .s2 { animation-name: s2; }
  @keyframes s2 {
    0%, 16%  { opacity: 0; transform: translateY(30px); }
    18.5%    { opacity: 1; transform: translateY(0); }
    31.5%    { opacity: 1; }
    33.33%   { opacity: 0; transform: translateY(-20px); }
    100%     { opacity: 0; }
  }
  .s2 .lead {
    font-family: 'Patrick Hand', cursive;
    color: var(--ink);
    font-size: 56px;
    margin-bottom: 30px;
    transform: rotate(-2deg);
    opacity: 0;
    animation: s2-lead 30s linear infinite both;
  }
  @keyframes s2-lead {
    0%, 17%  { opacity: 0; transform: translateY(20px) rotate(-2deg); }
    19%      { opacity: 1; transform: translateY(0) rotate(-2deg); }
    31.5%    { opacity: 1; }
    33.33%   { opacity: 0; }
    100%     { opacity: 0; }
  }
  .bubble {
    position: relative;
    background: rgba(255, 246, 220, .92);
    border: 3px solid var(--ink);
    border-radius: 28px;
    padding: 26px 34px;
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 54px;
    color: var(--ink);
    box-shadow: 12px 14px 0 rgba(26, 18, 8, .18);
    margin: 12px;
    display: inline-flex; align-items: center; gap: 22px;
    opacity: 0;
  }
  .bubble .face {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--pop-rose);
    display: grid; place-items: center;
    font-size: 50px;
    flex-shrink: 0;
  }
  /* Staggered bubble entries (spring-overshoot scale + translate) */
  .s2 .b1 { animation: s2-b1 30s linear infinite both; }
  .s2 .b2 { animation: s2-b2 30s linear infinite both; }
  .s2 .b3 { animation: s2-b3 30s linear infinite both; }
  @keyframes s2-b1 {
    0%, 20%  { opacity: 0; transform: translateX(-40px) translateY(60px) scale(.8) rotate(-3deg); }
    22%      { opacity: 1; transform: translateX(-40px) translateY(0) scale(1.06) rotate(-3deg); }
    23%      { transform: translateX(-40px) translateY(0) scale(1) rotate(-3deg); }
    31.5%    { opacity: 1; transform: translateX(-40px) translateY(0) scale(1) rotate(-3deg); }
    33.33%   { opacity: 0; }
    100%     { opacity: 0; }
  }
  @keyframes s2-b2 {
    0%, 23%  { opacity: 0; transform: translateX(50px) translateY(60px) scale(.8) rotate(2deg); }
    25%      { opacity: 1; transform: translateX(50px) translateY(0) scale(1.06) rotate(2deg); }
    26%      { transform: translateX(50px) translateY(0) scale(1) rotate(2deg); }
    31.5%    { opacity: 1; transform: translateX(50px) translateY(0) scale(1) rotate(2deg); }
    33.33%   { opacity: 0; }
    100%     { opacity: 0; }
  }
  @keyframes s2-b3 {
    0%, 26%  { opacity: 0; transform: translateX(-20px) translateY(60px) scale(.8) rotate(-1deg); }
    28%      { opacity: 1; transform: translateX(-20px) translateY(0) scale(1.06) rotate(-1deg); }
    29%      { transform: translateX(-20px) translateY(0) scale(1) rotate(-1deg); }
    31.5%    { opacity: 1; transform: translateX(-20px) translateY(0) scale(1) rotate(-1deg); }
    33.33%   { opacity: 0; }
    100%     { opacity: 0; }
  }

  /* ── Scene 3 — PRODUCT (10–15s) ──────────────────────── */
  .s3 { animation-name: s3; }
  @keyframes s3 {
    0%, 32%  { opacity: 0; transform: translateY(30px); }
    35%      { opacity: 1; transform: translateY(0); }
    48.5%    { opacity: 1; }
    50%      { opacity: 0; transform: translateY(-20px); }
    100%     { opacity: 0; }
  }
  .s3 .eyebrow {
    font-family: 'Patrick Hand', cursive;
    color: var(--ink);
    font-size: 64px;
    transform: rotate(-2deg);
    margin-bottom: 30px;
    opacity: 0;
    animation: s3-eyebrow 30s linear infinite both;
  }
  @keyframes s3-eyebrow {
    0%, 33%  { opacity: 0; transform: translateY(20px) rotate(-2deg); }
    35.5%    { opacity: 1; transform: translateY(0) rotate(-2deg); }
    48%      { opacity: 1; }
    50%      { opacity: 0; }
    100%     { opacity: 0; }
  }

  /* Phone mockup (reusable across reels) */
  .phone {
    width: 400px; height: 700px;
    background: var(--ink);
    border-radius: 56px;
    padding: 12px;
    box-shadow: 0 40px 80px rgba(26, 18, 8, .35), 0 0 0 3px rgba(26, 18, 8, .8) inset;
    position: relative;
    transform: rotate(3deg);
  }
  .phone::after {
    content: ""; position: absolute;
    top: 18px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 26px;
    background: #000;
    border-radius: 18px;
    z-index: 2;
  }
  .screen {
    background: #0b0b0d;
    border-radius: 46px;
    height: 100%;
    padding: 66px 24px 28px;
    color: #f4f4f6;
    display: flex; flex-direction: column;
    gap: 12px;
    overflow: hidden;
  }
  /* Slide-in with rotation overshoot */
  .s3 .phone {
    opacity: 0;
    animation: s3-phone 30s linear infinite both;
  }
  @keyframes s3-phone {
    0%, 34%  { opacity: 0; transform: translateX(700px) rotate(18deg); }
    37%      { opacity: 1; transform: translateX(0) rotate(0deg); }
    38.5%    { transform: translateX(0) rotate(3deg); }
    48%      { opacity: 1; transform: translateX(0) rotate(3deg); }
    50%      { opacity: 0; transform: translateX(-80px) rotate(0); }
    100%     { opacity: 0; }
  }

  /* ── Scene 4 — ASPIRATION (15–20s) ───────────────────── */
  .s4 { animation-name: s4; }
  @keyframes s4 {
    0%, 49%   { opacity: 0; transform: translateY(30px); }
    51.5%     { opacity: 1; transform: translateY(0); }
    65%       { opacity: 1; }
    66.67%    { opacity: 0; transform: translateY(-20px); }
    100%      { opacity: 0; }
  }
  /* Hero number with spring-overshoot */
  .s4 .hero-num {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 460px;
    line-height: .82;
    letter-spacing: -.07em;
    color: var(--ink);
    text-shadow: 10px 10px 0 rgba(26, 18, 8, .12);
    transform: rotate(-2deg);
    opacity: 0;
    animation: s4-num 30s linear infinite both;
  }
  @keyframes s4-num {
    0%, 50%   { opacity: 0; transform: scale(.2) rotate(-12deg); }
    52.5%     { opacity: 1; transform: scale(1.15) rotate(-2deg); }
    53.5%     { transform: scale(.95) rotate(-2deg); }
    54.5%     { transform: scale(1) rotate(-2deg); }
    65%       { opacity: 1; transform: scale(1) rotate(-2deg); }
    66.67%    { opacity: 0; transform: scale(.9) rotate(0); }
    100%      { opacity: 0; }
  }
  /* Stamp wobble (paired with hero number) */
  .s4 .stamp {
    background: var(--pop-rose);
    color: #fff4d6;
    padding: 18px 30px;
    border-radius: 22px;
    font-family: 'Patrick Hand', cursive;
    font-size: 64px;
    box-shadow: 0 16px 30px rgba(196, 74, 94, .4), inset 0 0 0 4px rgba(255, 244, 214, .35);
    transform: rotate(-7deg);
    opacity: 0;
    animation: s4-stamp 30s linear infinite both;
  }
  @keyframes s4-stamp {
    0%, 52%   { opacity: 0; transform: rotate(20deg) scale(.5); }
    54%       { opacity: 1; transform: rotate(-10deg) scale(1.1); }
    55%       { transform: rotate(-5deg) scale(.95); }
    56%       { transform: rotate(-7deg) scale(1); }
    65%       { opacity: 1; transform: rotate(-7deg) scale(1); }
    66.67%    { opacity: 0; transform: rotate(0) scale(.9); }
    100%      { opacity: 0; }
  }

  /* ── Scene 5 — URGENCY / lock (20–25s) ───────────────── */
  .s5 { animation-name: s5; }
  @keyframes s5 {
    0%, 66%  { opacity: 0; transform: translateY(30px); }
    68.5%    { opacity: 1; transform: translateY(0); }
    81.5%    { opacity: 1; }
    83.33%   { opacity: 0; transform: translateY(-20px); }
    100%     { opacity: 0; }
  }
  /* CSS-only padlock with spring-shut shackle */
  .lock { position: relative; width: 320px; height: 360px; opacity: 0; animation: s5-lock 30s linear infinite both; }
  .lock .body {
    position: absolute; bottom: 0; left: 0;
    width: 320px; height: 240px;
    background: linear-gradient(180deg, var(--bg-a) 0%, #c97b0a 100%);
    border-radius: 38px;
    box-shadow: inset 0 -20px 30px rgba(0,0,0,.2), 0 24px 50px rgba(26, 18, 8, .35);
  }
  .lock .keyhole { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 52px; height: 78px; z-index: 2; }
  .lock .keyhole::before { content: ""; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 52px; height: 52px; background: var(--ink); border-radius: 50%; }
  .lock .keyhole::after { content: ""; position: absolute; top: 38px; left: 50%; transform: translateX(-50%); width: 18px; height: 46px; background: var(--ink); }
  .lock .shackle {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 170px; height: 190px;
    border: 26px solid var(--ink);
    border-bottom: none;
    border-radius: 100px 100px 0 0;
    animation: s5-shackle 30s linear infinite both;
    transform-origin: 78% 100%;
  }
  @keyframes s5-lock {
    0%, 67%   { opacity: 0; transform: translateY(40px) scale(.7); }
    69%       { opacity: 1; transform: translateY(0) scale(1.05); }
    70%       { transform: scale(1); }
    81.5%     { opacity: 1; }
    83.33%    { opacity: 0; transform: scale(.95); }
    100%      { opacity: 0; }
  }
  @keyframes s5-shackle {
    0%, 69%   { transform: translateX(-50%) rotate(-35deg); }
    71%       { transform: translateX(-50%) rotate(0); }
    72%       { transform: translateX(-50%) rotate(-4deg); }
    72.5%     { transform: translateX(-50%) rotate(2deg); }
    73%       { transform: translateX(-50%) rotate(0); }
    100%      { transform: translateX(-50%) rotate(0); }
  }

  /* ── Scene 6 — CTA (25–30s) — only product-price screen ─── */
  .s6 { animation-name: s6; }
  @keyframes s6 {
    0%, 82.5% { opacity: 0; transform: translateY(30px); }
    85%       { opacity: 1; transform: translateY(0); }
    100%      { opacity: 1; transform: translateY(0); }
  }
  .s6 .endlead {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 100px;
    line-height: .96;
    letter-spacing: -.035em;
    color: var(--ink);
    text-align: center;
    max-width: 920px;
    opacity: 0;
    animation: s6-lead 30s linear infinite both;
  }
  .s6 .endlead .pop { color: var(--pop-rose-deep); font-style: italic; }
  @keyframes s6-lead {
    0%, 84%  { opacity: 0; transform: translateY(30px); }
    86%      { opacity: 1; transform: translateY(0); }
    100%     { opacity: 1; }
  }
  .s6 .cta {
    margin-top: 50px;
    padding: 32px 40px;
    background: var(--tile-strong);
    color: #fff4d6;
    border-radius: 32px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 26px;
    align-items: center;
    box-shadow: 0 30px 60px rgba(26, 18, 8, .35);
    width: 900px;
    opacity: 0;
    animation: s6-cta 30s linear infinite both;
  }
  @keyframes s6-cta {
    0%, 87%   { opacity: 0; transform: translateY(40px); }
    89%       { opacity: 1; transform: translateY(0); }
    100%      { opacity: 1; }
  }
  .s6 .price { font-weight: 900; font-size: 64px; color: var(--bg-a); letter-spacing: -.03em; display: flex; align-items: baseline; gap: 14px; line-height: 1; }
  .s6 .price small { font-size: 22px; font-weight: 800; color: rgba(255, 244, 214, .7); letter-spacing: .08em; text-transform: uppercase; }
  .s6 .price s { font-size: 26px; font-weight: 700; color: rgba(255, 244, 214, .55); text-decoration-color: #ff8a6b; text-decoration-thickness: 3px; }
  .s6 .hint { margin-top: 8px; font-size: 20px; color: rgba(255, 244, 214, .8); }
  /* Pulse-glow loop on CTA button */
  .s6 .joinbtn {
    padding: 22px 28px;
    background: var(--bg-a); color: var(--ink);
    border-radius: 999px;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: .04em;
    text-transform: uppercase;
    box-shadow: 0 10px 22px rgba(247, 167, 0, .5);
    white-space: nowrap;
    animation: pulseglow 1.5s ease-in-out infinite;
  }
  @keyframes pulseglow {
    0%, 100% { box-shadow: 0 10px 22px rgba(247, 167, 0, .5); transform: scale(1); }
    50%      { box-shadow: 0 14px 30px rgba(247, 167, 0, .85); transform: scale(1.04); }
  }
  .s6 .url {
    margin-top: 22px;
    font-weight: 900;
    font-size: 34px;
    color: var(--ink);
    text-align: center;
    opacity: 0;
    animation: s6-url 30s linear infinite both;
  }
  @keyframes s6-url {
    0%, 90%  { opacity: 0; }
    92%      { opacity: 1; }
    100%     { opacity: 1; }
  }
</style>
</head>

<body>
<div class="viewport">
  <div class="stage">

    <div class="progress"><i></i></div>

    <div class="ambient">
      <div class="d spark a1">&#10022;</div>
      <div class="d spark a2">&#10022;</div>
      <div class="d spark a3">&#10022;</div>
      <div class="d spark a4">&#10022;</div>
      <div class="d spark a5">&#10022;</div>
      <div class="d spark a6">&#10022;</div>
    </div>

    <!-- ─── s1 — HOOK ────────────────────────────────────── -->
    <section class="scene s1">
      <h1 class="hook">
        <span class="line1">[HOOK BEAT 1 — 3 to 5 words]</span>
        <span class="line2">[BEAT 2 with <b>[PUNCH]</b>]</span>
      </h1>
    </section>

    <!-- ─── s2 — PROBLEM ─────────────────────────────────── -->
    <section class="scene s2">
      <div class="lead">[Setup line]</div>
      <div class="bubble b1"><div class="face">&#128064;</div>[Beat 1]</div>
      <div class="bubble b2"><div class="face">&#128230;</div>[Beat 2]</div>
      <div class="bubble b3"><div class="face">&#128179;</div>[Beat 3]</div>
    </section>

    <!-- ─── s3 — PRODUCT ─────────────────────────────────── -->
    <section class="scene s3">
      <div class="eyebrow">[2–3 word eyebrow]</div>
      <div class="phone">
        <div class="screen">
          <!-- Drop product-specific UI here (matches the real app design) -->
        </div>
      </div>
    </section>

    <!-- ─── s4 — ASPIRATION ──────────────────────────────── -->
    <section class="scene s4">
      <div class="hero-num">[N]</div>
      <div class="stamp">[suffix]</div>
    </section>

    <!-- ─── s5 — URGENCY (padlock) ───────────────────────── -->
    <section class="scene s5">
      <div class="lock">
        <div class="body"></div>
        <div class="shackle"></div>
        <div class="keyhole"></div>
      </div>
    </section>

    <!-- ─── s6 — CTA (only price screen) ─────────────────── -->
    <section class="scene s6">
      <h1 class="endlead">[Lead with <span class="pop">italic</span> pivot]</h1>
      <div class="cta">
        <div></div>
        <div>
          <div class="price">[PRICE] <small>/mo</small> <s>[ANCHOR]</s></div>
          <div class="hint">[1-line proof / comparison]</div>
        </div>
        <div class="joinbtn">Join &rarr;</div>
      </div>
      <div class="url">[your-domain]<span class="slash">/</span>[path]</div>
    </section>

  </div>
</div>
</body>
</html>
